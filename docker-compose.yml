services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: cafe
      POSTGRES_PASSWORD: cafe
      POSTGRES_DB: cafe_de_app
    ports:
      - "5432:5432"
    volumes:
      - cafe_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cafe -d cafe_de_app"]
      interval: 2s
      timeout: 3s
      retries: 20

volumes:
  cafe_pg_data:
